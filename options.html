<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;

      --accent:      #0f62fe;

      --bg:          light-dark(oklch(98.5% 0.003 252), oklch(13%   0.008 252));
      --surface:     light-dark(oklch(99.5% 0.002 252), oklch(16.5% 0.008 252));
      --border:      light-dark(oklch(90%   0.005 252), oklch(24%   0.01  252));
      --text:        light-dark(oklch(15%   0.005 252), oklch(91%   0.004 252));
      --text-muted:  light-dark(oklch(55%   0.008 252), oklch(52%   0.008 252));
      --seg-bg:      light-dark(oklch(99.5% 0.002 252), oklch(13%   0.008 252));
      --thumb:       light-dark(oklch(99%   0     0),   oklch(95%   0     0));
      --row-hover:   light-dark(oklch(97%   0.003 252), oklch(19%   0.008 252));
      --seg-hover:   light-dark(oklch(96%   0.004 252), oklch(20.5% 0.009 252));

      --radius: 8px;
      --font:   'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
      min-width: 440px;
    }

    .container {
      width: 440px;
      margin: 0 auto;
      padding: 18px 20px 20px;
    }

    @media (max-width: 480px) {
      .container {
        width: 100%;
        box-sizing: border-box;
      }
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-icon {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ---- Toggle switch ---- */
    .toggle {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.15);
    }

    .toggle input:checked ~ .toggle-track {
      background: var(--accent);
      box-shadow: none;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: var(--thumb);
      border-radius: 50%;
      transition: transform 0.12s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .toggle input:checked ~ .toggle-track::after { transform: translateX(16px); }

    /* ---- Small toggle (extras) ---- */
    .toggle-sm {
      width: 30px;
      height: 17px;
    }

    .toggle-sm .toggle-track::after {
      width: 13px;
      height: 13px;
    }

    .toggle-sm input:checked ~ .toggle-track::after {
      transform: translateX(13px);
    }

    /* ---- Section card ---- */
    .section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .section-title {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    /* ---- Row ---- */
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      transition: background 0.08s;
    }

    .row + .row { border-top: 1px solid var(--border); }
    .row:hover { background: var(--row-hover); }

    .row-label small {
      display: block;
      font-size: 10.5px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ---- Segmented control ---- */
    .seg {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--seg-bg);
      flex-shrink: 0;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
    }

    .seg input[type=radio] { display: none; }

    .seg label {
      padding: 4px 9px;
      font-size: 11.5px;
      font-family: var(--font);
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
      user-select: none;
      transition: background 0.08s, color 0.08s;
      white-space: nowrap;
    }

    .seg label:last-of-type { border-right: none; }

    .seg label:hover {
      color: var(--text);
      background: var(--seg-hover);
    }

    .seg input[type=radio]:checked + label {
      background: var(--accent);
      color: #fff;
    }

    /* Full-width variant — used for close-tab activation */
    .seg-full {
      flex-shrink: unset;
      width: 100%;
    }

    .seg-full label {
      flex: 1;
      text-align: center;
    }

    /* ---- Header right group ---- */
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Small segmented variant (theme control in header) */
    .seg-sm label {
      padding: 3px 7px;
      font-size: 10.5px;
    }

    /* ---- Check row (extras) ---- */
    .check-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.08s;
    }

    .check-row + .check-row { border-top: 1px solid var(--border); }
    .check-row:hover { background: var(--row-hover); }

    .check-content strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
    }

    .check-content span {
      font-size: 10.5px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ---- Disabled state ---- */
    body.disabled .section {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>
</head>

      <h1>Anchrd Tabs</h1>
    </div>
    <div class="header-right">
      <div class="seg seg-sm" id="theme-control"></div>
      <label class="toggle">
        <input type="checkbox" id="enabled">
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <!-- New Tab Position -->
  <div class="section">
    <div class="section-title">New Tab Position</div>

    <div class="row">
      <div class="row-label">
        Link clicks
        <small>Middle-click, Ctrl+click, target=_blank</small>
      </div>
      <div class="seg" id="pos-linkClick"></div>
    </div>

    <div class="row">
      <div class="row-label">
        Blank new tab
        <small>Ctrl+T, new tab button</small>
      </div>
      <div class="seg" id="pos-blankNewTab"></div>
    </div>

    <div class="row">
      <div class="row-label">
        Reopened tab
        <small>Ctrl+Shift+T</small>
      </div>
      <div class="seg" id="pos-reopened"></div>
    </div>
  </div>

  <!-- Focus When Opening -->
  <div class="section">
    <div class="section-title">Focus When Opening</div>

    <div class="row">
      <div class="row-label">
        Link clicks
        <small>Middle-click, Ctrl+click</small>
      </div>
      <div class="seg" id="focus-linkClick"></div>
    </div>

    <div class="row">
      <div class="row-label">
        Blank new tab
        <small>Ctrl+T, new tab button</small>
      </div>
      <div class="seg" id="focus-blankNewTab"></div>
    </div>
  </div>

  <!-- After Closing -->
  <div class="section">
    <div class="section-title">After Closing a Tab, Activate</div>
    <div class="row">
      <div class="seg seg-full" id="onClose-activate"></div>
    </div>
  </div>

  <!-- Extras -->
  <div class="section">
    <div class="section-title">Extras</div>

    <label class="check-row">
      <div class="check-content">
        <strong>Join opener's tab group</strong>
        <span>New tabs opened from a grouped tab join that group automatically</span>
      </div>
      <div class="toggle toggle-sm">
        <input type="checkbox" id="moveToOpenerGroup">
        <div class="toggle-track"></div>
      </div>
    </label>

    <label class="check-row">
      <div class="check-content">
        <strong>Prevent duplicate tabs</strong>
        <span>Switch to the existing tab if the URL is already open</span>
      </div>
      <div class="toggle toggle-sm">
        <input type="checkbox" id="preventDuplicates">
        <div class="toggle-track"></div>
      </div>
